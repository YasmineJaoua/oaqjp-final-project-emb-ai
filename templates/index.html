<html>
<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="{{ url_for('static', filename='mywebscript.js') }}"></script>

    <style>
        .center-heading {
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card">
        <div class="card-body">

            <h1 class="center-heading">NLP - Emotion Detection</h1>

            <div class="form-group mt-4">
                <label>Please enter the text to be analyzed</label>
                <textarea class="form-control" id="textToAnalyze" rows="3"></textarea>
            </div>

            <button onclick="RunSentimentAnalysis()" class="btn btn-secondary mt-3">
                Run Emotion Analysis
            </button>

            <hr>

            <h2>Result of Emotion Detection</h2>

            <div id="system_response" class="mt-3"></div>

        </div>
    </div>

</div>

</body>
</html>
